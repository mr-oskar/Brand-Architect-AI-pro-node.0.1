kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.env]
PORT = "8080"
# Demo mode lets unauthenticated callers act as a "demo-user" so the dev
# preview is usable without signing in. It is hard-disabled at the code level
# when NODE_ENV === "production" (see middlewares/requireAuth.ts), and demo
# users are never granted admin access (see middlewares/requireAdmin.ts), so
# leaving this flag set in shared env is safe.
AUTH_ALLOW_DEMO = "1"

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/api-server", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["node", "--enable-source-maps", "artifacts/api-server/dist/index.mjs"]

[services.production.run.env]
PORT = "8080"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"
